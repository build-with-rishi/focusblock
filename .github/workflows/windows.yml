name: Windows

on:
  push:
    branches: [main]
    paths: ['windows/**', '.github/workflows/windows.yml']
  pull_request:
    paths: ['windows/**', '.github/workflows/windows.yml']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build windows -c Release
